<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>ProGear Hub | Contact Us</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>ProGear Hub</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="orders.html">Orders</a>
            <a href="about.html">About Us</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main class="page-content">

        <h2>Contact Us</h2>

        <p>Email: info@progearhub.com.au</p>
        <p>Phone: (03) 9000 1234</p>
        <p>Store: Melbourne, Victoria</p>

        <form>

            <label for="contact-name">Full Name</label>

            <input
                type="text"
                id="contact-name"
                name="contact-name"
                required
            >

            <label for="contact-email">Email Address</label>

            <input
                type="email"
                id="contact-email"
                name="contact-email"
                required
            >

            <label for="message">Message</label>

            <textarea
                id="message"
                name="message"
                rows="6"
                required
            ></textarea>

            <button type="submit">Send Message</button>

        </form>

    </main>

    <footer>
        <p>&copy; 2026 ProGear Hub</p>
    </footer>

</body>

</html>
